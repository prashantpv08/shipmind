name: axiom-local

services:
  postgres:
    image: postgres:17-bookworm
    environment:
      POSTGRES_DB: axiom
      POSTGRES_USER: axiom
      POSTGRES_PASSWORD: axiom-local-only
    ports:
      - "127.0.0.1:54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U axiom -d axiom"]
      interval: 2s
      timeout: 3s
      retries: 20
      start_period: 5s
    volumes:
      - axiom-postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init-test-db.sql:/docker-entrypoint-initdb.d/10-axiom-test.sql:ro
    restart: unless-stopped

volumes:
  axiom-postgres-data:
